<!DOCTYPE html>
<html>
<head>
<meta charset="ISO-8859-1">
<title>Check Result</title>
</head>
<style>
* {
	padding: 0px;
	margin: 0px;
	box-sizing: border-box;
}

body {
	height: 100vh;
	width: 100vw;
	display: flex;
	flex-direction: column;
	justify-content: center;
	align-items: center;
}

.maindiv {
	height: 200px;
	width: 400px;
	box-shadow: 0px 0px 20px;
	border-radius: 15px;
	border: none;
	display: flex;
	flex-direction: column;
	justify-content: center;
	align-items: center;
	padding-top: 18px;
}

.ep {
	height: 35px;
	width: 225px;
	margin-bottom: 10px;
	border: 1px solid black;
	border-radius: 10px;
	background-color: #f5f5f5;
	padding: 10px;
	outline: none;
}

.ep:focus {
	border: 2px solid black;
	outline: none;
}

.cr {
	height: 25px;
	width: 128px;
	border-radius: 7px;
	border: 1px solid black;
	transition: all 0.5s ease-in-out;
	margin-top: 15px;
	opacity:0.5;
}
.cr:hover{
cursor:pointer;
opacity:1;
}
</style>
<body>
	<form class="maindiv" action="result" method="post">
		<input type="email" name="checkemail" placeholder="Enter your email" class="ep" required>
		<input type="password" name="checkpass" placeholder="Enter your password" class="ep" required>
		<input type="submit" value="Check Result" class="cr">
	</form>
</body>
</html>
