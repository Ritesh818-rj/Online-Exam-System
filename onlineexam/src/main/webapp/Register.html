<!DOCTYPE html>
<html>
<head>
<meta charset="ISO-8859-1">
<title>Insert title here</title>
<style>
* {
	margin: 0;
	padding: 0;
	box-sizing: border-box;
}

body {
	height: 100vh;
	width: 100vw;
	display: flex;
	flex-direction: column;
	justify-content: center;
	align-items: center;
}

form {
	height: 330px;
	width: 500px;
	box-shadow: 0px 0px 19px 0px #ff8fa0;
	border-radius: 27px;
	display: flex;
	flex-direction: column;
	justify-content: center;
	align-items: center;
}

.in {
	height: 45px;
	width: 290px;
	padding: 10px;
	border: 1px solid #ff8fa0;
	border-radius: 10px;
	background-color: #f5f5f5;
}

.in:focus {
	border: 2px solid #ff8fa0;
	outline: none;
}

.in::placeholder {
	opacity: 0.6;
	padding: 10px;
}

#button {
	font-weight: bold;
	height: 35px;
	width: 215px;
	border-radius: 10px;
	border: 1px solid #ff8fa0;
	transition: all 0.5s ease-in-out;
}

#button:hover {
	background-color: #ff8fa0;
	cursor: pointer;
}

h1 {
	margin-bottom: 20px;
	color: #ff8fa0;
	opacity: 0.7;
}

a {
	position: relative;
	top: 18px;
}
</style>
</head>
<body>
	<h1>Register</h1>
	<form action="register" method="post">
		<input type="text" name="user" placeholder="Enter your name" class="in"
			style="margin-bottom: 20px;" required> <input type="email"
			name="remail" placeholder="Enter your email" class="in" required><br>
		<input type="password" name="rpass"
			placeholder="Create a strong password" class="in" required><br> <input
			type="submit" value="Register" id="button"> <a
			href="index.html">Alredy registered?Log in</a>
	</form>
</body>
</html>
