<!DOCTYPE html>
<html>
<head>
<meta charset="ISO-8859-1">
<title>Insert title here</title>
<style>
* {
	margin: 0;
	padding: 0;
	box-sizing: border-box;
}

body {
	height: 100vh;
	width: 100vw;
	display: flex;
	flex-direction: column;
	justify-content: center;
	align-items: center;
}

form {
	height: 260px;
	width: 500px;
	box-shadow: 0px 0px 19px 0px #8fcbff;
	border-radius: 27px;
	display: flex;
	flex-direction: column;
	justify-content: center;
	align-items: center;
}

.in {
	height: 45px;
	width: 290px;
	padding: 10px;
	border: 1px solid #8fcbff;
	border-radius: 10px;
	background-color: #f5f5f5;
}

.in:focus {
	border: 2px solid #8fcbff;
	outline: none;
}

.in::placeholder {
	opacity: 0.6;
	padding: 10px;
}

#button {
	font-weight: bold;
	height: 35px;
	width: 215px;
	border-radius: 10px;
	border: 1px solid #8fcbff;
	transition: all 0.5s ease-in-out;
}

#button:hover {
	background-color: #8fcbff;
	cursor: pointer;
}

h1 {
	margin-bottom: 20px;
	color: #8fcbff;
	opacity: 0.7;
}

a {
	position: relative;
	top: 18px;
}

.result {
	background-color: #00000040;
	width: 100%;
	margin-top: 80px;
	height: 40px;
	display: flex;
	justify-content: center;
	align-items: center;
}

.Cresult {
	color: #004884;
	border: 1px solid #004884;
	height: 25px;
	width: 110px;
	border-radius: 6px;
	opacity: 0.4;
	transition: all ease-in 0.5s;
	margin-bottom: 35px;
	font-size: 12px;
}

.Cresult:hover {
	cursor: pointer;
	opacity: 1;
}
</style>
</head>
<body>
	<h1>Login</h1>
	<form action="login" method="post">
		<input type="email" name="email" placeholder="Enter your email"
			class="in" required><br> <input type="password"
			name="pass" placeholder="Enter your password" class="in" required><br>
		<input type="submit" value="Login" id="button"> <a
			href="Register.html">New here? Register</a>
	</form>
	<div class="result">
		<a href="result.html"> <input type="submit" value="Check Result"
			class="Cresult">
		</a>
	</div>
</body>
</html>
